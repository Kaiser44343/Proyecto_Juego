<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Juego</title>
    <link rel="stylesheet" href="Styles/juego.css">
    <script src="Script/juego.js" defer></script>
    <!--Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Barra de estado superior -->
    <header id="bar_estado" class="barra_estado">
        <div id="nombre_personaje">Personaje: <span>Nombre</span></div>
        <div id="tipo_clase">Clase: <span> Indefinido </span></div>
    </header>

    <!-- Menu Principal -->
    <h1 id="titulo">TÍTULO DEL JUEGO</h1>
    <div id="menu_principal">
        <button id="NewG">Nueva partida</button>
        <button id="continue">Continuar</button>
        <button id="Opts">Opciones</button>
        <button id="Exit">Salir</button>
    </div>

    <!-- Pantalla de selección_personaje -->
    <div id="seleccion_personaje" class="">
        <div class="contenedor_seleccion">
            <h2>Elige tu Clase</h2>
            <div class="clases">
                <div class="clase" id="clase_asesino">
                    <img src="Assets/asesino.png" alt="Asesino">
                    <h3>Asesino</h3>
                    <p>Sigilo y daño crítico.</p>
                    <button class="btn_seleccionar">Elegir</button>
                </div>
                <div class="clase" id="clase_mago">
                    <img src="Assets/mago.png" alt="Mago">
                    <h3>Mago</h3>
                    <p>Magia arcana y control.</p>
                    <button class="btn_seleccionar">Elegir</button>
                </div>
                <div class="clase" id="clase_soldado">
                    <img src="Assets/soldado.png" alt="Soldado">
                    <h3>Soldado</h3>
                    <p>Defensa y fuerza bruta.</p>
                    <button class="btn_seleccionar">Elegir</button>
                </div>
            </div>
            <button id="btn_cancelar">Volver</button>
        </div>
    </div>

    <!-- Panel inferior de acciones -->
    <div id="divpadre">
        <div id="box1" class="hijo">
            Acción 1
            <div class="escondido" id="subbox1">Submenú 1</div>
        </div>
        <div id="box2" class="hijo">
            Acción 2
            <div class="escondido" id="subbox2">Submenú 2</div>
        </div>
        <div id="box3" class="hijo">
            Acción 3
            <div class="escondido" id="subbox3">Submenú 3</div>
        </div>
        <div id="box4" class="hijo">
            Acción 4
            <div class="escondido" id="subbox4">Submenú 4</div>
        </div>
    </div>
</body>

</html>
